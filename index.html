<!DOCTYPE html>
<html>
<head>
    <title>Blackout</title>
    <style>
        body {
            background-color: #000000;
            margin: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Removes scrollbars */
        }
    </style>
</head>
<body>
<script type="module">
  import Typebot from 'https://cdn.jsdelivr.net/npm/@typebot.io/js@0/dist/web.js'

  Typebot.initBubble({
    typebot: "my-typebot-qvsggmy",
    theme: {
      button: { backgroundColor: "#000" },
      chatWindow: { backgroundColor: "#FAF3EA" },
    },
  });
</script>


</body>
</html>
